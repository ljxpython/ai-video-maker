<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Video Maker Browser Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #17202a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(1120px, calc(100vw - 64px));
      }

      h1 {
        margin: 0 0 16px;
        font-size: 56px;
        font-weight: 760;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 28px;
        max-width: 780px;
        font-size: 22px;
        line-height: 1.55;
        color: #384452;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .item {
        min-height: 128px;
        border: 1px solid #d7dce2;
        border-radius: 8px;
        background: #ffffff;
        padding: 22px;
      }

      .item strong {
        display: block;
        margin-bottom: 10px;
        font-size: 18px;
      }

      .item span {
        color: #536170;
        line-height: 1.45;
      }

      @media (max-width: 760px) {
        main {
          width: min(100vw - 32px, 560px);
        }

        h1 {
          font-size: 36px;
        }

        p {
          font-size: 18px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>AI Video Maker</h1>
      <p>本地 Browser Adapter 预检页面，用于验证页面加载、标题识别、截图非空和后续录制准备。</p>
      <section class="grid" aria-label="workflow">
        <div class="item">
          <strong>需求对齐</strong>
          <span>把用户的视频目标落到 brief 和可确认的 plan。</span>
        </div>
        <div class="item">
          <strong>能力适配</strong>
          <span>按需接入 Browser、Chrome 和桌面 GUI，不作为核心依赖。</span>
        </div>
        <div class="item">
          <strong>视频产物</strong>
          <span>生成配音、字幕、横屏视频、QA 报告和发布包。</span>
        </div>
      </section>
    </main>
  </body>
</html>
